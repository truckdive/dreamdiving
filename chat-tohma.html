<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이시바시 토우마 — Truckdive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf8f5;
      --soft-white: #ffffff;
      --blush: #f5e6e8;
      --rose: #d4a0a7;
      --muted-rose: #c08a92;
      --dusty-blue: #b8c9d9;
      --sage: #b8c4b8;
      --text-dark: #3a3035;
      --text-mid: #6b5c62;
      --text-light: #9e8e94;
      --border: #e8dde0;
      --chat-bg: #f2eff0;
      --my-bubble: #dce8f0;
      --char-bubble: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--chat-bg);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 상단 바 ── */
    .chat-header {
      background: var(--soft-white);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-shrink: 0;
      position: relative;
    }
    .back-btn {
      font-size: 1.1rem;
      color: var(--text-light);
      text-decoration: none;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--muted-rose); }

    .char-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4c5c7, #b8c9d9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--text-mid);
      flex-shrink: 0;
      overflow: hidden;
    }
    .char-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .char-info { flex: 1; }
    .char-info-name {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-dark);
    }
    .char-info-sub {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-top: 0.1rem;
    }

    .affinity-badge {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.2rem;
    }
    .affinity-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-light);
      text-transform: uppercase;
    }
    .affinity-bar {
      width: 70px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .affinity-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--dusty-blue));
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .affinity-num {
      font-size: 0.62rem;
      color: var(--muted-rose);
    }

    /* ── 채팅 영역 ── */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 날짜 구분선 */
    .date-divider {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-light);
      letter-spacing: 0.15em;
      margin: 0.5rem 0;
      position: relative;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 28%;
      height: 1px;
      background: var(--border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    /* 말풍선 */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.mine {
      flex-direction: row-reverse;
    }

    .bubble-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4c5c7, #b8c9d9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.8rem;
      color: var(--text-mid);
      flex-shrink: 0;
      overflow: hidden;
    }
    .bubble-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .bubble-avatar.hidden { visibility: hidden; }

    .bubble-wrap { max-width: 72%; display: flex; flex-direction: column; gap: 0.2rem; }
    .msg-row.mine .bubble-wrap { align-items: flex-end; }

    .bubble-name {
      font-size: 0.65rem;
      color: var(--text-light);
      padding-left: 0.3rem;
    }

    .bubble {
      padding: 0.65rem 0.9rem;
      border-radius: 18px;
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--text-dark);
      word-break: keep-all;
    }
    .char-bubble-style {
      background: var(--char-bubble);
      border-radius: 4px 18px 18px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .my-bubble-style {
      background: var(--my-bubble);
      border-radius: 18px 18px 4px 18px;
    }

    .bubble-time {
      font-size: 0.6rem;
      color: var(--text-light);
      padding: 0 0.3rem;
      align-self: flex-end;
    }

    /* 타이핑 인디케이터 */
    .typing-row { display: none; }
    .typing-row.show { display: flex; }
    .typing-bubble {
      background: var(--char-bubble);
      border-radius: 4px 18px 18px 18px;
      padding: 0.65rem 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      gap: 0.3rem;
      align-items: center;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-light);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── 선택지 영역 ── */
    .choices-area {
      background: var(--soft-white);
      border-top: 1px solid var(--border);
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }
    .choices-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--text-light);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .choices-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .choice-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.55rem 1rem;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text-mid);
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .choice-btn:hover {
      border-color: var(--rose);
      color: var(--muted-rose);
      background: var(--blush);
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* 하루 제한 메시지 */
    .daily-limit {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: var(--text-light);
      line-height: 1.8;
    }
    .daily-limit span { color: var(--muted-rose); }

    /* 호감도 레벨업 토스트 */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-dark);
      color: white;
      font-size: 0.75rem;
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.4s;
      white-space: nowrap;
      pointer-events: none;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="chat-header">
  <a class="back-btn" href="index.html">‹</a>
  <div class="char-avatar" id="header-avatar"><img src="img/tohma_pr.png" alt="토우마"></div>
  <div class="char-info">
    <div class="char-info-name">이시바시 토우마</div>
    <div class="char-info-sub" id="online-status">프로스트하임 부대장</div>
  </div>
  <div class="affinity-badge">
    <div class="affinity-label">affinity</div>
    <div class="affinity-bar"><div class="affinity-fill" id="affinity-fill" style="width:0%"></div></div>
    <div class="affinity-num" id="affinity-num">0 / 100</div>
  </div>
</div>

<div class="chat-body" id="chat-body">
  <div class="date-divider" id="date-divider"></div>
  <!-- 메시지들이 여기 들어감 -->
  <div class="msg-row typing-row" id="typing-indicator">
    <div class="bubble-avatar"><img src="img/tohma_pr.png" alt="토우마"></div>
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</div>

<div class="choices-area" id="choices-area">
  <div class="choices-label">— 선택 —</div>
  <div class="choices-list" id="choices-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════
//  대화 데이터
//  visits = 방문 횟수 조건 (1 = 첫 방문, 2 = 2번째~, etc.)
//  affinity = 호감도 조건 (이상)
//  messages = 캐릭터 첫 메시지 (배열이면 랜덤)
//  choices = 선택지 배열
//    each choice: { text, reply, affinityGain, next }
//    next = 다음 선택지 키 (없으면 대화 종료)
// ════════════════════════════════════════
const SCRIPT = {

  // ── 1일차 ──
  day1: {
    condition: { visits: 1 },
    message: "이런, 처음 보는 얼굴이네요. 특기생이라는 게 당신이군요.",
    choices: [
      {
        text: "...네, 잘 부탁드립니다.",

        affinityGain: 5,
        next: "day1_b"
      },
      {
        text: "당신은 누구세요?",
        reply: "오호, 뻔뻔하네요. 좋아요. 이시바시 토우마. 프로스트하임 부대장입니다.",
        affinityGain: 8,
        next: "day1_b"
      },
      {
        text: "(아무 말도 하지 않는다)",
        reply: "...과묵한 타입인가요? 재밌네요. 크크.",
        affinityGain: 3,
        next: "day1_b"
      }
    ]
  },

  day1_b: {
    message: "그래서, 여기엔 무슨 일로 온 건가요?",
    choices: [
      {
        text: "그냥... 궁금해서요.",
        reply: "궁금증이 많군요. 좋아요, 그런 사람은 오래 살아남더라고요. 크크.",
        affinityGain: 5,
        next: null
      },
      {
        text: "당신을 보러 왔어요.",
        reply: "...하. 솔직한 사람이네요. 당혹스럽지만, 나쁘지 않아요.",
        affinityGain: 12,
        next: null
      }
    ]
  },

  // ── 2~4일차 ──
  day2: {
    condition: { visits: 2, visitsMax: 4 },
    message: ["또 왔군요. 집에 돌아가는 길을 잃었나요?", "오늘도 찾아주셨네요. 크크... 기대하기 시작했나요?"],
    choices: [
      {
        text: "또 보고 싶었어요.",
        reply: "..그런 말을 쉽게 하는 사람이군요. 주의해야겠는데.",
        affinityGain: 10,
        next: "day2_b"
      },
      {
        text: "딱히 이유는 없어요.",
        reply: "이유 없이 오는 사람이 제일 위험하죠. 크크크.",
        affinityGain: 6,
        next: "day2_b"
      }
    ]
  },

  day2_b: {
    message: "프로스트하임에 대해 궁금한 게 있나요?",
    choices: [
      {
        text: "토우마 씨 이야기가 더 궁금해요.",
        reply: "...저요? 크크. 딱히 재밌는 이야기는 없는데. 그래도 듣고 싶다면야.",
        affinityGain: 10,
        next: null
      },
      {
        text: "프로스트하임은 어떤 곳이에요?",
        reply: "차갑고, 날카롭고, 아름다운 곳이죠. 마치 저처럼. 크크.",
        affinityGain: 5,
        next: null
      }
    ]
  },

  // ── 5일차 이상, 호감도 30 미만 ──
  day5_low: {
    condition: { visits: 5, affinity: 0, affinityMax: 29 },
    message: "...매일 오는군요. 질리지 않나요?",
    choices: [
      {
        text: "질리지 않아요.",
        reply: "크크. 그거 참 이상한 취향이네요.",
        affinityGain: 7,
        next: null
      },
      {
        text: "토우마 씨가 질리지 않아요?",
        reply: "...글쎄요. 아직은.",
        affinityGain: 10,
        next: null
      }
    ]
  },

  // ── 5일차 이상, 호감도 30 이상 ──
  day5_high: {
    condition: { visits: 5, affinity: 30 },
    message: "오늘도 왔군요. ...사실, 기다리고 있었어요. 조금.",
    choices: [
      {
        text: "기다려줬어요?",
        reply: "크크... 인정하기 싫지만, 그렇다고 거짓말은 안 해요.",
        affinityGain: 15,
        next: "day5_high_b"
      },
      {
        text: "저도 빨리 오고 싶었어요.",
        reply: "...그래요. 알고 있었어요. 크크.",
        affinityGain: 12,
        next: "day5_high_b"
      }
    ]
  },

  day5_high_b: {
    message: "당신은 참 이상한 사람이에요. 이쪽에 끌리는 게.",
    choices: [
      {
        text: "이상한 게 싫어요?",
        reply: "...아니요. 오히려. 크크크.",
        affinityGain: 10,
        next: null
      },
      {
        text: "토우마 씨도 이상한 것 같은데요.",
        reply: "하. ...부정은 안 하죠. 크크.",
        affinityGain: 8,
        next: null
      }
    ]
  }
};

// ════════════════════════════════════════
//  저장 키
// ════════════════════════════════════════
const KEY_NAME      = 'dd_player_name';
const KEY_AFFINITY  = 'dd_affinity_tohma';
const KEY_VISIT     = 'dd_visit_count';
const KEY_CHAT_DATE = 'dd_chat_tohma_date';   // 마지막으로 새 대사 본 날짜
const KEY_CHAT_LOG  = 'dd_chat_tohma_log';    // 채팅 로그 (표시용)

let affinity   = parseInt(localStorage.getItem(KEY_AFFINITY) || '0', 10);
let visits     = parseInt(localStorage.getItem(KEY_VISIT)    || '1', 10);
let playerName = localStorage.getItem(KEY_NAME) || '특기생';
let currentChoices = [];

// ════════════════════════════════════════
//  유틸
// ════════════════════════════════════════
function todayStr() { return new Date().toLocaleDateString('ko-KR'); }
function nowTime()  {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function saveAffinity(val) {
  affinity = Math.min(100, Math.max(0, val));
  localStorage.setItem(KEY_AFFINITY, affinity);
  updateAffinityBar();
}

function updateAffinityBar() {
  document.getElementById('affinity-fill').style.width = affinity + '%';
  document.getElementById('affinity-num').textContent  = affinity + ' / 100';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════
//  메시지 렌더
// ════════════════════════════════════════
function appendMsg(who, text, time, showAvatar = true) {
  const body = document.getElementById('chat-body');
  const typing = document.getElementById('typing-indicator');

  const row = document.createElement('div');
  row.className = 'msg-row' + (who === 'me' ? ' mine' : '');

  if (who !== 'me') {
    const av = document.createElement('div');
    av.className = 'bubble-avatar' + (showAvatar ? '' : ' hidden');
    av.innerHTML = '<img src="img/tohma_pr.png" alt="토우마" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
    row.appendChild(av);
  }

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (who === 'me' ? 'my-bubble-style' : 'char-bubble-style');
  bubble.innerHTML = text.replace(/\n/g, '<br>');
  wrap.appendChild(bubble);

  const timeEl = document.createElement('div');
  timeEl.className = 'bubble-time';
  timeEl.textContent = time;
  wrap.appendChild(timeEl);

  row.appendChild(wrap);
  body.insertBefore(row, typing);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  document.getElementById('typing-indicator').classList.add('show');
  document.getElementById('chat-body').scrollTop = 9999;
}
function hideTyping() {
  document.getElementById('typing-indicator').classList.remove('show');
}

// ════════════════════════════════════════
//  선택지 렌더
// ════════════════════════════════════════
function renderChoices(choices) {
  const list = document.getElementById('choices-list');
  list.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => onChoose(i);
    list.appendChild(btn);
  });
  currentChoices = choices;
}

function clearChoices() {
  document.getElementById('choices-list').innerHTML = '';
  currentChoices = [];
}

function showDailyLimit() {
  const area = document.getElementById('choices-area');
  area.innerHTML = `<div class="daily-limit">오늘은 여기까지예요.<br><span>내일 다시 찾아와요.</span></div>`;
}

// ════════════════════════════════════════
//  선택지 클릭
// ════════════════════════════════════════
function onChoose(idx) {
  const choice = currentChoices[idx];
  if (!choice) return;

  // 버튼 비활성화
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.add('disabled'));

  const t = nowTime();

  // 내 메시지
  appendMsg('me', choice.text, t);

  // 호감도 증가
  const prevAffinity = affinity;
  saveAffinity(affinity + choice.affinityGain);
  if (Math.floor(affinity / 10) > Math.floor(prevAffinity / 10)) {
    setTimeout(() => showToast('♡ 호감도가 올랐어요'), 1200);
  }

  // 타이핑 후 답변
  clearChoices();
  showTyping();
  setTimeout(() => {
    hideTyping();
    appendMsg('char', choice.reply, nowTime());

    // 다음 선택지
    if (choice.next && SCRIPT[choice.next]) {
      setTimeout(() => {
        const next = SCRIPT[choice.next];
        const msg = Array.isArray(next.message) ? pick(next.message) : next.message;
        showTyping();
        setTimeout(() => {
          hideTyping();
          appendMsg('char', msg, nowTime());
          renderChoices(next.choices);
        }, 900 + Math.random() * 600);
      }, 600);
    } else {
      // 대화 종료 — 날짜 저장
      localStorage.setItem(KEY_CHAT_DATE, todayStr());
      setTimeout(() => showDailyLimit(), 800);
    }
  }, 800 + Math.random() * 700);
}

// ════════════════════════════════════════
//  오늘의 스크립트 선택
// ════════════════════════════════════════
function selectScript() {
  // 오늘 이미 대화했는지
  const lastChat = localStorage.getItem(KEY_CHAT_DATE);
  if (lastChat === todayStr()) return null;

  // 조건 순서대로 검사
  const candidates = [
    // 높은 호감도 우선
    (visits >= 5 && affinity >= 30)  ? SCRIPT.day5_high   : null,
    (visits >= 5 && affinity < 30)   ? SCRIPT.day5_low    : null,
    (visits >= 2 && visits <= 4)     ? SCRIPT.day2        : null,
    (visits === 1)                   ? SCRIPT.day1        : null,
  ];
  return candidates.find(Boolean) || SCRIPT.day2;
}

// ════════════════════════════════════════
//  초기화
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  updateAffinityBar();

  // 날짜 표시
  document.getElementById('date-divider').textContent = todayStr();

  const script = selectScript();

  if (!script) {
    // 오늘 이미 대화함
    // 이전 로그 복원 (간단하게 안내 메시지만)
    appendMsg('char', '크크... 오늘은 이미 이야기했잖아요. 내일 또 오세요.', nowTime());
    showDailyLimit();
    return;
  }

  // 첫 메시지 표시
  const openMsg = Array.isArray(script.message) ? pick(script.message) : script.message;
  showTyping();
  setTimeout(() => {
    hideTyping();
    appendMsg('char', openMsg, nowTime());
    renderChoices(script.choices);
  }, 1000);
});
</script>
