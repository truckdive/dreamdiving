<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ 나의 작은 세계 ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       🎨 색상 & 기본 테마
       여기서 사이트 전체 색상을 바꿀 수 있어요!
    ============================================= */
    :root {
      --bg: #fdf6ee;           /* 배경색 */
      --bg2: #f5e9d8;          /* 카드/패널 배경 */
      --bg3: #ede0cc;          /* 더 진한 패널 */
      --accent: #b07d62;       /* 포인트 색상 (갈색 계열) */
      --accent2: #d4a574;      /* 포인트 색상 2 (밝은 갈색) */
      --text: #3a2e26;         /* 기본 글자색 */
      --text2: #7a6555;        /* 보조 글자색 */
      --text3: #a08878;        /* 더 연한 글자색 */
      --border: #d9c9b4;       /* 테두리 색상 */
      --shadow: rgba(100, 70, 50, 0.12); /* 그림자 */
      --notification-bg: #3a2e26; /* 알림 배경 (어두운 색) */
      --notification-text: #fdf6ee; /* 알림 글자 */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 텍스처 느낌 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(176,125,98,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(212,165,116,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       📱 이름 입력 모달 (최초 접속 시)
    ============================================= */
    #name-modal {
      display: none; /* JS가 필요 시 flex로 바꿔요 */
      position: fixed;
      inset: 0;
      background: rgba(58, 46, 38, 0.6);
      backdrop-filter: blur(8px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    #name-modal.active { display: flex; }

    .modal-box {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px var(--shadow);
      animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-box .deco {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .modal-box h2 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .modal-box p {
      font-size: 0.8rem;
      color: var(--text3);
      margin-bottom: 24px;
    }

    .modal-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg2);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }

    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--text3); }

    .modal-btn {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .modal-btn:hover { background: var(--text); }
    .modal-btn:active { transform: scale(0.98); }

    /* =============================================
       🔔 선톡 알림 (화면 상단)
    ============================================= */
    #notification {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      z-index: 9998;
      background: var(--notification-bg);
      color: var(--notification-text);
      border-radius: 16px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 280px;
      max-width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
    }

    #notification.show {
      transform: translateX(-50%) translateY(0);
    }

    .notif-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .notif-content { flex: 1; min-width: 0; }

    .notif-name {
      font-size: 0.75rem;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .notif-msg {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* =============================================
       🗂️ 상단 네비게이션
    ============================================= */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(253, 246, 238, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    nav {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
    }

    .site-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .nav-tabs {
      display: flex;
      gap: 4px;
    }

    .nav-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
    }

    .nav-tab:hover { color: var(--text); background: var(--bg2); }

    .nav-tab.active {
      background: var(--accent);
      color: #fff;
    }

    /* =============================================
       📄 페이지 공통
    ============================================= */
    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* =============================================
       🏠 홈 페이지
    ============================================= */
    .home-hero {
      text-align: center;
      padding: 48px 0 36px;
    }

    .home-hero .greeting-small {
      font-size: 0.82rem;
      color: var(--text3);
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }

    .home-hero h1 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 2rem;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .home-hero h1 .name-highlight {
      color: var(--accent);
    }

    .home-hero .sub {
      font-size: 0.85rem;
      color: var(--text2);
      line-height: 1.8;
    }

    /* 홈 카드들 */
    .home-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 32px;
    }

    .home-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .home-card:hover {
      background: var(--bg3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .home-card .card-icon { font-size: 28px; margin-bottom: 10px; }
    .home-card .card-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 4px;
    }
    .home-card .card-desc { font-size: 0.75rem; color: var(--text3); }

    /* 이름 변경 섹션 */
    .name-change-section {
      margin-top: 40px;
      padding: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .section-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.9rem;
      color: var(--text2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .name-change-row {
      display: flex;
      gap: 8px;
    }

    .name-change-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .name-change-row input:focus { border-color: var(--accent); }

    .name-change-row button {
      padding: 10px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .name-change-row button:hover { background: var(--text); }

    /* =============================================
       💬 메신저 페이지 - 캐릭터 목록
    ============================================= */
    .messenger-list { padding-top: 8px; }

    .messenger-header {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .char-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .char-item:hover { background: var(--bg2); }

    .char-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      position: relative;
    }

    .char-avatar .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: #7bc67e;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .char-info { flex: 1; min-width: 0; }

    .char-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .char-preview {
      font-size: 0.78rem;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-meta {
      font-size: 0.72rem;
      color: var(--text3);
      text-align: right;
      flex-shrink: 0;
    }

    /* 읽지 않은 메시지 뱃지 */
    .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      border-radius: 10px;
      padding: 2px 7px;
      margin-top: 4px;
    }

    /* 구분선 */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* =============================================
       💬 메신저 - 대화창
    ============================================= */
    #chat-view { display: none; }
    #chat-view.active { display: flex; flex-direction: column; height: calc(100vh - 56px); }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(253,246,238,0.9);
      backdrop-filter: blur(8px);
    }

    .chat-back {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text2);
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .chat-back:hover { background: var(--bg2); }

    .chat-char-name {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1rem;
      color: var(--text);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 날짜 구분 */
    .chat-date-divider {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text3);
      margin: 8px 0;
    }

    /* 메시지 말풍선 */
    .msg {
      display: flex;
      gap: 8px;
      max-width: 80%;
    }

    .msg.char-msg { align-self: flex-start; }
    .msg.user-msg { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.87rem;
      line-height: 1.6;
      max-width: 260px;
    }

    .char-msg .msg-bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .user-msg .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem;
      color: var(--text3);
      align-self: flex-end;
      margin-bottom: 2px;
      flex-shrink: 0;
    }

    /* 선택지 버튼들 */
    .choices {
      align-self: flex-end;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 280px;
      width: 100%;
    }

    .choice-btn {
      padding: 10px 16px;
      background: var(--bg);
      border: 1.5px solid var(--accent);
      border-radius: 20px;
      color: var(--accent);
      font-size: 0.82rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .choice-btn:hover {
      background: var(--accent);
      color: #fff;
    }

    .choice-btn:disabled {
      opacity: 0.5;
      cursor: default;
      background: var(--bg2);
      border-color: var(--border);
      color: var(--text3);
    }

    /* 잠금 메시지 */
    .locked-msg {
      text-align: center;
      padding: 24px;
      color: var(--text3);
      font-size: 0.8rem;
      line-height: 1.7;
    }

    /* =============================================
       🖼️ 갤러리 페이지
    ============================================= */
    .gallery-section-title {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 1rem;
      color: var(--text);
      margin: 32px 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gallery-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* 갤러리 그리드 - 세로 배치로 이미지 원본 비율 유지 */
    .gallery-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .gallery-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: visible;
      transition: all 0.2s;
    }

    .gallery-card:hover {
      box-shadow: 0 6px 20px var(--shadow);
    }

    .gallery-card-img {
      width: 100%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--text3);
      position: relative;
      border-radius: 14px 14px 0 0;
      overflow: hidden;
    }

    /* 이미지 있을 때 — 원본 비율 그대로 */
    .gallery-card-img img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 이미지 없을 때 — 이모지 플레이스홀더 */
    .gallery-card-img.no-image {
      aspect-ratio: 3/4;
    }

    /* 터치 영역 블록 */
    .touch-zone {
      position: absolute;
      cursor: pointer;
      border-radius: 8px;
      background: transparent;
      border: none;
      transition: background 0.2s;
    }

    .touch-zone:hover {
      background: transparent;
    }

    .gallery-card-label {
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--text2);
    }

    /* 대사 말풍선 — fixed 포지션으로 카드 밖 잘림 방지 */
    .speech-bubble {
      position: fixed;
      background: rgba(253, 246, 238, 0.82);
      backdrop-filter: blur(6px);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--text);
      max-width: 220px;
      line-height: 1.6;
      box-shadow: 0 4px 16px rgba(100,70,50,0.18);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 500;
      word-break: keep-all;
    }

    .speech-bubble.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* 라이트박스 (이미지 원본 크기로 보기) */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,20,15,0.85);
      backdrop-filter: blur(6px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      cursor: default;
      animation: lbIn 0.25s ease;
    }

    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }

    #lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      background: none;
      border: none;
      line-height: 1;
    }

    #lightbox-close:hover { opacity: 1; }

    /* 랜덤 대사 카드 */
    .random-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 12px;
    }

    .random-card .char-tag {
      font-size: 0.72rem;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .random-card .speech-text {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 16px;
      min-height: 48px;
    }

    .random-card .random-choices {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .random-card .r-choice {
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--bg);
      color: var(--text2);
      font-size: 0.8rem;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }

    .random-card .r-choice:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .random-card .r-response {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg3);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.7;
      display: none;
    }

    .random-card .r-response.show { display: block; }

    /* 다시 뽑기 버튼 */
    .reroll-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      margin-top: 12px;
      transition: color 0.2s;
    }

    .reroll-btn:hover { color: var(--accent); }

    /* =============================================
       ✨ 기타 유틸

        ]
      },
      {
        timeRange: "all",
        lines: [
          "어, 왔어?",
          "잘 지냈어?",

/* ==============================================
   🔧 아래는 동작 코드예요. 건드리지 않아도 돼요!
   (대사/이름만 위에서 수정하면 됩니다)
=============================================== */

// 현재 시간대 반환
function getTimeRange() {
  const h = new Date().getHours();
  if (h >= 6 && h < 12) return "morning";
  if (h >= 12 && h < 18) return "afternoon";
  if (h >= 18 && h < 22) return "evening";
  return "night";
}

// 방문 횟수 관리
function getVisitCount() {
  return parseInt(localStorage.getItem('visitCount') || '0');
}

function incrementVisit() {
  const v = getVisitCount() + 1;
  localStorage.setItem('visitCount', v);
  return v;
}

// 사용자 이름
function getUserName() {
  return localStorage.getItem('userName') || '특기생';
}

function setUserName(name) {
  if (!name.trim()) return;
  localStorage.setItem('userName', name.trim());
  document.getElementById('home-name').textContent = name.trim();
}

// 이름 모달
function saveNameFromModal() {
  const val = document.getElementById('modal-name-input').value.trim();
  if (!val) { showToast('이름을 입력해주세요!'); return; }
  setUserName(val);
  document.getElementById('name-modal').classList.remove('active');
}

// 이름 변경 (홈)
function changeName() {
  const val = document.getElementById('name-change-input').value.trim();
  if (!val) { showToast('이름을 입력해주세요!'); return; }
  setUserName(val);
  document.getElementById('name-change-input').value = '';
  showToast(`"${val}"(으)로 변경됐어요 ✦`);
}

// 페이지 전환
function showPage(pageId, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  if (tabEl) tabEl.classList.add('active');

  // 메신저로 갈 때 목록 보여주기
  if (pageId === 'messenger') {
    document.getElementById('messenger-list-view').style.display = 'block';
    document.getElementById('chat-view').classList.remove('active');
  }
}

// 토스트 메시지
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* =============================================
   메신저 - 캐릭터 목록 생성
============================================= */
function buildCharList() {
  const list = document.getElementById('char-list');
  list.innerHTML = '';
  CHARACTERS.forEach((char, i) => {
    const div = document.createElement('div');
    div.className = 'char-item';
    div.onclick = () => openChat(char.id);

    // 저장된 마지막 메시지
    const saved = getChatLog(char.id);
    const lastMsg = saved.length > 0
      ? saved[saved.length - 1].text
      : char.preview;

    div.innerHTML = `
      <div class="char-avatar">
        ${char.emoji}
        <div class="online-dot"></div>
      </div>
      <div class="char-info">
        <div class="char-name">${char.name}</div>
        <div class="char-preview">${lastMsg.substring(0, 20)}${lastMsg.length > 20 ? '...' : ''}</div>
      </div>
      <div class="char-meta">
        <div style="font-size:0.7rem;color:var(--text3)">Day ${getVisitCount()}</div>
      </div>
    `;
    list.appendChild(div);
    if (i < CHARACTERS.length - 1) {
      const d = document.createElement('div');
      d.className = 'divider';
      list.appendChild(d);
    }
  });
}

/* =============================================
   메신저 - 대화창
============================================= */
let currentCharId = null;

function getChatLog(charId) {
  try {
    return JSON.parse(localStorage.getItem('chatLog_' + charId) || '[]');
  } catch { return []; }
}

function saveChatLog(charId, log) {
  localStorage.setItem('chatLog_' + charId, JSON.stringify(log));
}

function openChat(charId) {
  currentCharId = charId;
  const char = CHARACTERS.find(c => c.id === charId);
  if (!char) return;

  document.getElementById('messenger-list-view').style.display = 'none';
  const chatView = document.getElementById('chat-view');
  chatView.classList.add('active');
  document.getElementById('chat-avatar').textContent = char.emoji;
  document.getElementById('chat-char-name').textContent = char.name;

  renderChat(charId);
  checkAndAppendNewDialogue(charId);
}

function backToList() {
  document.getElementById('chat-view').classList.remove('active');
  document.getElementById('messenger-list-view').style.display = 'block';
  buildCharList();
}

// 저장된 로그 렌더링
function renderChat(charId) {
  const log = getChatLog(charId);
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';

  log.forEach(entry => {
    if (entry.type === 'char') appendCharMsg(entry.text, false);
    else if (entry.type === 'user') appendUserMsg(entry.text, false);
    else if (entry.type === 'date') appendDateDiv(entry.text, false);
  });
  container.scrollTop = container.scrollHeight;
}

function appendCharMsg(text, save = true) {
  const char = CHARACTERS.find(c => c.id === currentCharId);
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg char-msg';
  div.innerHTML = `
    <div class="msg-avatar">${char?.emoji || '?'}</div>
    <div>
      <div class="msg-bubble">${text}</div>
    </div>
    <div class="msg-time">${getCurrentTime()}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  if (save) {
    const log = getChatLog(currentCharId);
    log.push({ type: 'char', text });
    saveChatLog(currentCharId, log);
  }
}

function appendUserMsg(text, save = true) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg user-msg';
  div.innerHTML = `
    <div class="msg-bubble">${text}</div>
    <div class="msg-time">${getCurrentTime()}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  if (save) {
    const log = getChatLog(currentCharId);
    log.push({ type: 'user', text });
    saveChatLog(currentCharId, log);
  }
}

function appendDateDiv(text, save = true) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-date-divider';
  div.textContent = text;
  container.appendChild(div);

  if (save) {
    const log = getChatLog(currentCharId);
    log.push({ type: 'date', text });
    saveChatLog(currentCharId, log);
  }
}

function getCurrentTime() {
  const now = new Date();
  return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
}

// 오늘 이 캐릭터 대화 했는지 확인
function hasDialogueToday(charId) {
  const key = 'dialogueDate_' + charId;
  const saved = localStorage.getItem(key);
  const today = new Date().toDateString();
  return saved === today;
}

function markDialogueToday(charId) {
  localStorage.setItem('dialogueDate_' + charId, new Date().toDateString());
}

// 오늘 날짜에 맞는 대화 찾기
function findDialogue(charId) {
  const visits = getVisitCount();
  const timeRange = getTimeRange();

  // 시간대 일치 먼저, 없으면 "all"
  const candidates = DIALOGUES.filter(d =>
    d.charId === charId &&
    d.day <= visits &&
    (d.timeRange === timeRange || d.timeRange === 'all')
  );

  // 시간대 일치 우선
  const timeMatch = candidates.find(d => d.timeRange === timeRange && d.day === visits);
  const allMatch = candidates.find(d => d.timeRange === 'all' && d.day === visits);
  const anyMatch = candidates.find(d => d.day <= visits);

  return timeMatch || allMatch || anyMatch || null;
}

// 새 대화 추가 (이미 오늘 했으면 안 함)
function checkAndAppendNewDialogue(charId) {
  if (hasDialogueToday(charId)) return;

  const dialogue = findDialogue(charId);
  if (!dialogue) return;

  markDialogueToday(charId);

  const today = new Date();
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
  appendDateDiv(`— ${dateStr} —`);

  let i = 0;
  const msgs = dialogue.messages;

  function nextMsg() {
    if (i >= msgs.length) return;
    const m = msgs[i++];

    if (m.type === 'char') {
      setTimeout(() => {
        appendCharMsg(m.text);
        nextMsg();
      }, 600);
    } else if (m.type === 'choices') {
      // 선택지 렌더링
      const repliesAfter = msgs.slice(i).filter(x => x.type === 'reply');
      appendChoices(m.options, repliesAfter);
      // 선택지는 유저가 누를 때까지 대기
    }
  }

  setTimeout(nextMsg, 500);
}

function appendChoices(options, replies) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'choices';

  options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      // 모든 선택지 비활성화
      div.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      appendUserMsg(opt);

      // 해당 선택지 답변 찾기
      const reply = replies.find(r => r.replyTo === idx);
      if (reply) {
        setTimeout(() => appendCharMsg(reply.text), 700);
      }
    };
    div.appendChild(btn);
  });

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  // 선택지 자체는 로그에 저장하지 않아도 돼요
}

/* =============================================
   🔔 선톡 알림
============================================= */
let notifCharId = null;

function scheduleProactiveMsg() {
  const visits = getVisitCount();

  // 오늘 이미 선톡 받았는지 확인
  const notifToday = localStorage.getItem('notifDate');
  if (notifToday === new Date().toDateString()) return;

  // 조건 만족하는 것 필터
  const eligible = PROACTIVE_MSGS.filter(p => visits >= p.minVisits);
  if (!eligible.length) return;

  // 랜덤으로 하나 선택
  const pick = eligible[Math.floor(Math.random() * eligible.length)];
  const char = CHARACTERS.find(c => c.id === pick.charId);
  if (!char) return;

  const msg = pick.messages[Math.floor(Math.random() * pick.messages.length)];

  setTimeout(() => {
    showNotification(pick.charId, char.name, char.emoji, msg);
    localStorage.setItem('notifDate', new Date().toDateString());
  }, pick.delay * 1000);
}

function showNotification(charId, name, emoji, msg) {
  notifCharId = charId;
  document.getElementById('notif-avatar').textContent = emoji;
  document.getElementById('notif-name').textContent = name;
  document.getElementById('notif-msg').textContent = msg;

  const notif = document.getElementById('notification');
  notif.classList.add('show');

  setTimeout(() => notif.classList.remove('show'), 5000);
}

function openChatFromNotif() {
  document.getElementById('notification').classList.remove('show');
  if (!notifCharId) return;

  // 메신저 탭으로 이동
  showPage('messenger', document.querySelector('.nav-tab:nth-child(2)'));
  setTimeout(() => openChat(notifCharId), 300);
}

/* =============================================
   🖼️ 갤러리 - 터치 대사
============================================= */

// 전역 말풍선 (DOM에 하나만 두고 위치를 JS로 조정)
const globalBubble = document.createElement('div');
globalBubble.className = 'speech-bubble';
document.body.appendChild(globalBubble);
let globalBubbleTimer;

function showBubbleAt(x, y, text) {
  globalBubble.textContent = text;
  globalBubble.style.left = '50%';
  globalBubble.style.transform = 'translateX(-50%)';
  globalBubble.style.top = 'auto';
  globalBubble.style.bottom = '32px';
  globalBubble.classList.add('show');
  clearTimeout(globalBubbleTimer);
  globalBubbleTimer = setTimeout(() => globalBubble.classList.remove('show'), 4000);
}

function buildTouchGallery() {
  const grid = document.getElementById('touch-gallery');
  grid.innerHTML = '';

  TOUCH_ITEMS.forEach(item => {
    const card = document.createElement('div');
    card.className = 'gallery-card';

    const imgDiv = document.createElement('div');
    imgDiv.className = 'gallery-card-img';

    if (item.image) {
      const img = document.createElement('img');
      img.src = item.image;
      img.alt = item.title;
      imgDiv.appendChild(img);

      // 이미지 로드 후 터치존 위치 재계산이 필요없도록
      // zone 좌표는 % 기준이라 그대로 동작함
    } else {
      imgDiv.classList.add('no-image');
      imgDiv.textContent = item.emoji || '🖼️';
    }

    // 터치 영역 추가
    item.zones.forEach((zone) => {
      const zoneDiv = document.createElement('div');
      zoneDiv.className = 'touch-zone';
      zoneDiv.style.cssText =
        `top:${zone.top};left:${zone.left};width:${zone.width};height:${zone.height};`;

      zoneDiv.onclick = (e) => {
        e.stopPropagation();
        const line = zone.lines[Math.floor(Math.random() * zone.lines.length)];
        const name = getUserName();
        const text = line.replace(/\{이름\}/g, name);
        showBubbleAt(e.clientX, e.clientY, text);
      };

      imgDiv.appendChild(zoneDiv);
    });

    const label = document.createElement('div');
    label.className = 'gallery-card-label';
    label.textContent = item.title;

    card.appendChild(imgDiv);
    card.appendChild(label);
    grid.appendChild(card);
  });
}

// 라이트박스
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

/* =============================================
   🎲 갤러리 - 랜덤 대사
============================================= */
function buildRandomGallery() {
  const container = document.getElementById('random-gallery');
  container.innerHTML = '';

  RANDOM_ITEMS.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'random-card';
    card.id = 'rcard-' + idx;
    container.appendChild(card);
    renderRandomCard(idx);
  });
}

function renderRandomCard(idx) {
  const item = RANDOM_ITEMS[idx];
  const card = document.getElementById('rcard-' + idx);
  const timeRange = getTimeRange();

  // 시간대 맞는 그룹 찾기
  const group = item.timeGroups.find(g => g.timeRange === timeRange)
    || item.timeGroups.find(g => g.timeRange === 'all')
    || item.timeGroups[0];

  const line = group.lines[Math.floor(Math.random() * group.lines.length)];
  const name = getUserName();

  card.innerHTML = `
    <div class="char-tag">✦ ${item.charName}</div>
    <div class="speech-text">${line.replace(/\{이름\}/g, name)}</div>
    ${group.choices ? `
      <div class="random-choices">
        ${group.choices.map((c, ci) => `
          <button class="r-choice" onclick="pickRandomChoice(${idx}, ${ci})">${c.text}</button>
        `).join('')}
      </div>
      <div class="r-response" id="rresp-${idx}"></div>
    ` : ''}
    <button class="reroll-btn" onclick="renderRandomCard(${idx})">↻ 다시 뽑기</button>
  `;
}

function pickRandomChoice(cardIdx, choiceIdx) {
  const item = RANDOM_ITEMS[cardIdx];
  const timeRange = getTimeRange();
  const group = item.timeGroups.find(g => g.timeRange === timeRange)
    || item.timeGroups.find(g => g.timeRange === 'all')
    || item.timeGroups[0];

  if (!group.choices) return;
  const choice = group.choices[choiceIdx];
  const name = getUserName();

  // 선택지 버튼 비활성화
  const card = document.getElementById('rcard-' + cardIdx);
  card.querySelectorAll('.r-choice').forEach(b => b.disabled = true);

  const resp = document.getElementById('rresp-' + cardIdx);
  resp.textContent = choice.reply.replace(/\{이름\}/g, name);
  resp.classList.add('show');
}

/* =============================================
   🚀 초기화
============================================= */
window.addEventListener('load', () => {
  // 이름 확인
  const savedName = localStorage.getItem('userName');
  if (!savedName) {
    document.getElementById('name-modal').classList.add('active');
    document.getElementById('modal-name-input').focus();
  } else {
    document.getElementById('home-name').textContent = savedName;
  }

  // 방문 횟수 증가
  incrementVisit();

  // 캐릭터 목록 구성
  buildCharList();

  // 갤러리 구성
  buildTouchGallery();
  buildRandomGallery();

  // 선톡 알림 예약
  scheduleProactiveMsg();
});

// 모달에서 엔터키
document.getElementById('modal-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveNameFromModal();
});
</script>
